    header {
      background: #000;

      padding: 16px;
      text-align: center;
      font-size: 24px;
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .install-btn {
      background: #fff;
      color: #000;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: none;
    }
    
    .install-btn.show {
      display: block;
    }
    
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding-bottom: 180px;
    }
    
    .category {
      margin: 16px 12px;
    }
    
    .category-title {
      font-size: 16px;
      font-weight: 600;
      color: #000;
      background: #fff;
      padding: 12px;
      margin-bottom: 8px;
      border-radius: 8px;
      border-bottom: 1px solid #e0e0e0;
    }
    
    .product {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fff;
      padding: 12px;
      margin-bottom: 8px;
      border-radius: 8px;
      border: 0.5px solid #e0e0e0;
    }
    
    .product-info h3 {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
    }
    
    .product-info p {
      font-size: 13px;
      color: #666;
    }
    
    .controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .btn {
      width: 32px;
      height: 32px;
      border: 0.5px solid #ddd;
      background: #fff;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .btn:active {
      background: #f0f0f0;
    }
    
    .qty {
      min-width: 28px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
    }
    
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-top: 0.5px solid #e0e0e0;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .summary {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      padding: 0 12px;
    }
    
    .summary-total {
      font-size: 18px;
      font-weight: 700;
      color: #000;
      border-top: 0.5px solid #e0e0e0;
      padding-top: 8px;
      display: flex;
      justify-content: space-between;
    }
    
    .checkout-btn {
      background: #000;
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    
    .checkout-btn:active {
      transform: scale(0.98);
    }
    
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }
  </style>

    let cart = JSON.parse(localStorage.getItem('cart')) || {};

    function renderMenu() {
      const menu = document.getElementById('menu');
      menu.innerHTML = '';
      
      Object.entries(PRODUCTS).forEach(([category, products]) => {
        const categoryDiv = document.createElement('div');
        categoryDiv.className = 'category';
        
        const title = document.createElement('div');
        title.className = 'category-title';
        title.textContent = category;
        categoryDiv.appendChild(title);
        
        products.forEach(product => {
          const productDiv = document.createElement('div');
          productDiv.className = 'product';
          
          const qty = cart[product.id] || 0;
          
          productDiv.innerHTML = `
            <div class="product-info">
              <h3>${product.name}</h3>
              <p>€${product.price.toFixed(2)}</p>
            </div>
            <div class="controls">
              ${qty > 0 ? `<button class="btn" onclick="removeItem('${product.id}')">−</button>` : ''}
              ${qty > 0 ? `<span class="qty">${qty}</span>` : ''}
              <button class="btn" onclick="addItem('${product.id}')">+</button>
            </div>
          `;
          categoryDiv.appendChild(productDiv);
        });
        
        menu.appendChild(categoryDiv);
      });
      
      updateTotal();
    }

    function addItem(id) {
      cart[id] = (cart[id] || 0) + 1;
      saveCart();
      renderMenu();
    }

    function removeItem(id) {
      if (cart[id] > 1) {
        cart[id]--;
      } else {
        delete cart[id];
      }
      saveCart();
      renderMenu();
    }

    function saveCart() {
      localStorage.setItem('cart', JSON.stringify(cart));
    }

    function calculateTotal() {
      let total = 0;
      Object.entries(cart).forEach(([id, qty]) => {
        Object.values(PRODUCTS).forEach(category => {
          const product = category.find(p => p.id === id);
          if (product) total += product.price * qty;
        });
      });
      return total;
    }

    function getTotalItems() {
      return Object.values(cart).reduce((sum, qty) => sum + qty, 0);
    }

    function updateTotal() {
      document.getElementById('itemCount').textContent = getTotalItems();
      document.getElementById('totalPrice').textContent = '€' + calculateTotal().toFixed(2).replace('.', ',');
    }

    function checkout() {
      const total = getTotalItems();
      if (total === 0) {
        alert('Please add items before ordering');
        return;
      }
      
      const items = [];
      Object.entries(cart).forEach(([id, qty]) => {
        Object.values(PRODUCTS).forEach(category => {
          const product = category.find(p => p.id === id);
          if (product) items.push(`${qty}x ${product.name}`);
        });
      });
      
      const message = `Order:\n${items.join('\n')}\n\nTotal: €${calculateTotal().toFixed(2).replace('.', ',')}`;
      const encoded = encodeURIComponent(message);
      window.open(`https://wa.me/4915253415522?text=${encoded}`, '_blank');
    }

    // PWA Install
    let installPrompt = null;
    
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      installPrompt = e;
      document.getElementById('installBtn').classList.add('show');
    });

    document.getElementById('installBtn').addEventListener('click', async () => {
      if (installPrompt) {
        installPrompt.prompt();
        const { outcome } = await installPrompt.userChoice;
        console.log(`User response to the install prompt: ${outcome}`);
        installPrompt = null;
      }
    });

    // Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed:', err));
    }

    renderMenu();
  </script>
