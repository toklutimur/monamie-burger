<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MonAmie Order</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #f4f6f8;
      --text-color: #1e293b;
      --card-bg: rgba(255, 255, 255, 0.85);
      --card-border: rgba(0, 0, 0, 0.08);
      --accent: #f97316;
      --accent-hover: #ea580c;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Outfit', sans-serif; 
      background: var(--bg-color); 
      color: var(--text-color);
      padding-bottom: 120px;
    }
    header { 
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--card-border);
      padding: 0.75rem 1.5rem; 
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      flex-direction: row;
      gap: 1.5rem;
      align-items: center;
      justify-content: flex-start;
    }
    .header-title {
      text-align: left; 
      font-size: 1.4rem; 
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: transparent;
      background-image: linear-gradient(90deg, #f97316, #fbbf24);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      white-space: nowrap;
    }
    #searchInput {
      flex: 1;
      max-width: 300px;
      padding: 0.6rem 1rem;
      border-radius: 20px;
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      color: var(--text-color);
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    #searchInput:focus {
      border-color: var(--accent);
    }
    .main-layout {
      display: flex;
      align-items: flex-start;
      max-width: 1400px;
      margin: 0 auto;
    }
    .category-nav {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding: 1.5rem 1rem;
      position: sticky;
      top: 80px;
      height: calc(100vh - 80px);
      overflow-y: auto;
      min-width: 220px;
      border-right: 1px solid var(--card-border);
      scroll-behavior: smooth;
    }
    .category-nav::-webkit-scrollbar { display: none; }
    .category-pill {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      padding: 0.75rem 1rem;
      border-radius: 12px;
      text-align: left;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-color);
      transition: all 0.2s;
    }
    .category-pill:hover, .category-pill.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .container { flex: 1; padding: 1.5rem; min-width: 0; }

    @media (max-width: 768px) {
      .main-layout { flex-direction: column; }
      .category-nav {
        flex-direction: row;
        height: auto;
        min-width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--card-border);
        padding: 0.75rem 1rem;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        z-index: 99;
      }
      .category-pill {
        white-space: nowrap;
        padding: 0.5rem 1rem;
        border-radius: 20px;
      }
    }
    
    .category { margin-bottom: 3rem; }
    .category-title { 
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 2px solid var(--accent);
      padding-bottom: 0.5rem;
      display: inline-block;
    }
    
    .products-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 0.75rem;
    }
    
    .product { 
      background: var(--card-bg); 
      border: 1px solid var(--card-border);
      border-radius: 12px; 
      padding: 0.75rem;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    }
    .product:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.15);
      border-color: var(--accent);
    }
    
    .product-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.5rem;
      gap: 0.5rem;
    }
    
    .product-name {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.2;
    }
    
    .product-price {
      color: var(--accent);
      font-size: 1.1rem;
      font-weight: 700;
      white-space: nowrap;
    }
    
    .product-desc {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 0.75rem;
      line-height: 1.3;
      flex-grow: 1;
    }
    
    .controls { 
      display: flex; 
      align-items: center; 
      gap: 0.5rem;
      justify-content: flex-end;
      background: rgba(0,0,0,0.03);
      padding: 0.25rem 0.5rem;
      border-radius: 30px;
      width: fit-content;
      margin-left: auto;
    }
    
    .btn { 
      background: var(--accent); 
      color: #fff; 
      border: none; 
      width: 28px; 
      height: 28px; 
      border-radius: 50%; 
      font-size: 1rem; 
      font-weight: 700;
      cursor: pointer; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      transition: all 0.2s;
    }
    .btn:hover { background: var(--accent-hover); transform: scale(1.1); }
    .btn:active { transform: scale(0.95); }
    
    .qty { 
      font-weight: 700; 
      min-width: 16px; 
      text-align: center;
      font-size: 1rem;
    }
    
    footer { 
      position: fixed; 
      bottom: 0; 
      left: 0; 
      right: 0; 
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid var(--card-border); 
      padding: 1.25rem 2rem; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      z-index: 100;
      box-shadow: 0 -10px 25px rgba(0,0,0,0.05);
    }
    
    .total { 
      font-weight: 700; 
      font-size: 1.2rem;
      cursor: pointer;
    }
    .total small {
      color: #64748b;
      font-size: 0.8rem;
      font-weight: 400;
      display: block;
      margin-top: 0.25rem;
    }
    
    .checkout-btn { 
      background: linear-gradient(135deg, var(--accent), var(--accent-hover)); 
      color: #fff; 
      border: none; 
      padding: 1rem 2rem; 
      border-radius: 30px; 
      font-weight: 700; 
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .checkout-btn:hover { 
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(249, 115, 22, 0.5);
    }
    .checkout-btn:active { transform: translateY(1px); }
    
    .install-btn { 
      position: fixed; 
      top: 15px; 
      right: 15px; 
      background: rgba(0,0,0,0.8); 
      color: #fff; 
      border: 1px solid rgba(0,0,0,0.9); 
      padding: 0.5rem 1rem; 
      border-radius: 20px; 
      font-size: 0.85rem; 
      cursor: pointer; 
      z-index: 200; 
      display: none; 
      backdrop-filter: blur(5px);
      transition: all 0.3s;
    }
    .install-btn:hover { background: #000; }
    .install-btn.show { display: block; }
    
    .cart-items {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-color);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 1.5rem;
      max-width: 450px;
      width: 90%;
      max-height: 50vh;
      overflow-y: auto;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
    }
    .cart-items.show { 
      opacity: 1; 
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }
    
    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--card-border);
      color: var(--text-color);
    }
    .cart-item:last-child { border-bottom: none; }
    
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-color); }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.3); }
  </style>
</head>

    let cart = JSON.parse(localStorage.getItem('cart')) || {};
    let cartVisible = false;

    function filterMenu() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      renderMenu(query);
    }

    function renderMenu(searchQuery = '') {
      const menu = document.getElementById('menu');
      const categoryNav = document.getElementById('categoryNav');
      menu.innerHTML = '';
      if(categoryNav && searchQuery === '') categoryNav.innerHTML = '';
      
      Object.entries(PRODUCTS).forEach(([category, products]) => {
        const filteredProducts = products.filter(p => 
          p.name.toLowerCase().includes(searchQuery) || 
          (p.desc && p.desc.toLowerCase().includes(searchQuery))
        );
        
        if (filteredProducts.length === 0) return;
        
        if(categoryNav && searchQuery === '') {
          const pill = document.createElement('div');
          pill.className = 'category-pill';
          pill.textContent = category;
          pill.onclick = () => {
             const target = document.getElementById('cat-' + category.replace(/\s+/g, '-'));
             if (target) {
               const y = target.getBoundingClientRect().top + window.scrollY - 180;
               window.scrollTo({top: y, behavior: 'smooth'});
             }
          };
          categoryNav.appendChild(pill);
        }

        const categoryDiv = document.createElement('div');
        categoryDiv.className = 'category';
        categoryDiv.id = 'cat-' + category.replace(/\s+/g, '-');
        
        const title = document.createElement('div');
        title.className = 'category-title';
        title.textContent = category;
        categoryDiv.appendChild(title);
        
        const list = document.createElement('div');
        list.className = 'products-list';
        
        filteredProducts.forEach(product => {
          const productDiv = document.createElement('div');
          productDiv.className = 'product';
          
          const qty = cart[product.id] || 0;
          
          productDiv.innerHTML = `
            <div class="product-header">
              <div class="product-name">${product.name}</div>
              <div class="product-price">€${product.price.toFixed(2).replace('.', ',')}</div>
            </div>
            ${product.desc ? `<div class="product-desc">${product.desc}</div>` : ''}
            <div class="controls">
              ${qty > 0 ? `<button class="btn" onclick="removeItem('${product.id}')">−</button>` : ''}
              ${qty > 0 ? `<span class="qty">${qty}</span>` : ''}
              <button class="btn" onclick="addItem('${product.id}')">+</button>
            </div>
          `;
          list.appendChild(productDiv);
        });
        
        categoryDiv.appendChild(list);
        menu.appendChild(categoryDiv);
      });
      
      updateTotal();
    }

    function addItem(id) {
      cart[id] = (cart[id] || 0) + 1;
      saveCart();
      renderMenu();
    }

    function removeItem(id) {
      if (cart[id] > 1) {
        cart[id]--;
      } else {
        delete cart[id];
      }
      saveCart();
      renderMenu();
    }

    function saveCart() {
      localStorage.setItem('cart', JSON.stringify(cart));
    }

    function calculateTotal() {
      let total = 0;
      Object.entries(cart).forEach(([id, qty]) => {
        Object.values(PRODUCTS).forEach(category => {
          const product = category.find(p => p.id === id);
          if (product) total += product.price * qty;
        });
      });
      return total;
    }

    function getTotalItems() {
      return Object.values(cart).reduce((sum, qty) => sum + qty, 0);
    }

    function updateTotal() {
      document.getElementById('itemCount').textContent = getTotalItems();
      document.getElementById('totalPrice').textContent = '€' + calculateTotal().toFixed(2).replace('.', ',');
      updateCartDetails();
    }
    
    function updateCartDetails() {
      const cartDiv = document.getElementById('cartItems');
      if (getTotalItems() === 0) {
        cartDiv.classList.remove('show');
        return;
      }
      
      let html = '';
      Object.entries(cart).forEach(([id, qty]) => {
        Object.values(PRODUCTS).forEach(category => {
          const product = category.find(p => p.id === id);
          if (product) {
            html += `
              <div class="cart-item">
                <div style="flex: 1;">
                  <div>${product.name}</div>
                  <div style="color: var(--accent); font-weight: bold;">€${(product.price * qty).toFixed(2).replace('.', ',')}</div>
                </div>
                <div class="controls" style="margin-left: 1rem;">
                  <button class="btn" onclick="removeItem('${product.id}')">−</button>
                  <span class="qty">${qty}</span>
                  <button class="btn" onclick="addItem('${product.id}')">+</button>
                </div>
              </div>
            `;
          }
        });
      });
      html += `<div style="margin-top: 1rem; font-weight: 700; text-align: right;">Total: €${calculateTotal().toFixed(2)}</div>`;
      cartDiv.innerHTML = html;
    }
    
    function toggleCart() {
      const cartDiv = document.getElementById('cartItems');
      cartVisible = !cartVisible;
      if (cartVisible && getTotalItems() > 0) {
        cartDiv.classList.add('show');
      } else {
        cartDiv.classList.remove('show');
      }
    }

    function checkout() {
      const total = getTotalItems();
      if (total === 0) {
        alert('Please add items before ordering');
        return;
      }
      
      const items = [];
      Object.entries(cart).forEach(([id, qty]) => {
        Object.values(PRODUCTS).forEach(category => {
          const product = category.find(p => p.id === id);
          if (product) items.push(`${qty}x ${product.name}`);
        });
      });
      
      const message = `Order:\n${items.join('\n')}\n\nTotal: €${calculateTotal().toFixed(2).replace('.', ',')}`;
      const encoded = encodeURIComponent(message);
      window.open(`https://wa.me/4915253415522?text=${encoded}`, '_blank');
    }

    // PWA Install
    let installPrompt = null;
    
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      installPrompt = e;
      document.getElementById('installBtn').classList.add('show');
    });

    document.getElementById('installBtn').addEventListener('click', async () => {
      if (installPrompt) {
        installPrompt.prompt();
        const { outcome } = await installPrompt.userChoice;
        console.log(`User response: ${outcome}`);
        installPrompt = null;
      }
    });

    // Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(err => console.log('SW failed:', err));
    }

    renderMenu();
  </script>
